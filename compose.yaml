name: consultoria

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: consultoria-sqlserver

    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"

    ports:
      - "14333:1433"

    volumes:
      - consultoria_sql_data:/var/opt/mssql

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -b -l 3 -Q \"SELECT 1\" -o /dev/null || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

    restart: unless-stopped

  api:
    image: consultoria-api:${API_VERSION:-0.1.0}
    container_name: consultoria-api

    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_CONFIGURATION: Release

    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080

      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=ConsultoriaDb;User Id=sa;Password=${MSSQL_SA_PASSWORD};Encrypt=True;TrustServerCertificate=True;"

      Jwt__Key: "${JWT_KEY}"
      Jwt__Issuer: "Consultoria.Api"
      Jwt__Audience: "Consultoria.Client"
      Jwt__ExpirationMinutes: "60"

      SeedUsers__AdminPassword: "${SEED_ADMIN_PASSWORD}"
      SeedUsers__UserPassword: "${SEED_USER_PASSWORD}"

    ports:
      - "8080:8080"

    depends_on:
      sqlserver:
        condition: service_healthy

    restart: unless-stopped

volumes:
  consultoria_sql_data:
    name: consultoria_sql_data